name: Update Radio Stream URLs

on:
  schedule:
    # 매일 한국 시간 새벽 4시에 자동 실행 (서버 부하 적은 시간)
    - cron: '0 * * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  update-gist:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치 (이 부분이 핵심!)
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 크롤러 스크립트 실행 및 Gist 업데이트
      env:
        # GitHub Secrets에 저장된 GIST_TOKEN을 불러옵니다
        GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
      run: python scraper.py
